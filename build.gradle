plugins {
    id 'java'
    id 'war'
}

group = 'org.mnuykin'
version = '0.0.1-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

ext {
    springframeworkVersion = "6.2.18"
    springframeworkDataVersion = "4.0.5"
    junitVersion = "5.9.2"
    mapstructVersion = "1.6.3"
    lombokVersion = "1.18.46"
    lombokMapstructVersion = "0.2.0"
}

dependencies {
    implementation "org.springframework:spring-context:${springframeworkVersion}"
    implementation("org.springframework:spring-webmvc:${springframeworkVersion}")
    testImplementation "org.springframework:spring-test:${springframeworkVersion}"
    implementation "org.springframework.data:spring-data-jdbc:${springframeworkDataVersion}"

    implementation "org.mapstruct:mapstruct:${mapstructVersion}"
    annotationProcessor "org.mapstruct:mapstruct-processor:${mapstructVersion}"
    testAnnotationProcessor "org.mapstruct:mapstruct-processor:${mapstructVersion}"

    compileOnly "org.projectlombok:lombok:${lombokVersion}"
    annotationProcessor "org.projectlombok:lombok:${lombokVersion}"
    testCompileOnly "org.projectlombok:lombok:${lombokVersion}"
    testAnnotationProcessor "org.projectlombok:lombok:${lombokVersion}"
    annotationProcessor "org.projectlombok:lombok-mapstruct-binding:${lombokMapstructVersion}"
    testAnnotationProcessor "org.projectlombok:lombok-mapstruct-binding:${lombokMapstructVersion}"

    testImplementation "org.junit.jupiter:junit-jupiter-api:${junitVersion}"
    testImplementation "org.junit.jupiter:junit-jupiter-engine:${junitVersion}"
    testRuntimeOnly "org.junit.jupiter:junit-jupiter-engine:${junitVersion}"

    compileOnly 'jakarta.servlet:jakarta.servlet-api:6.1.0'
    implementation 'org.postgresql:postgresql:42.7.11'
    implementation("jakarta.annotation:jakarta.annotation-api:2.1.1")
}

test {
    useJUnitPlatform()
}